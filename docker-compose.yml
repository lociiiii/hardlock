services:
  postgres:
    image: postgres:16-alpine
    container_name: hardlock-postgres
    environment:
      POSTGRES_USER: hardlock
      POSTGRES_PASSWORD: hardlock
      POSTGRES_DB: hardlock
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hardlock -d hardlock"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: hardlock-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hardlock-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://hardlock:hardlock@postgres:5432/hardlock
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./server:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["--reload"]

volumes:
  postgres_data:
